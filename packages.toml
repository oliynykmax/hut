description = "Beautiful C++ stack traces header-only"
includes = ["."]
sources = ["backward.cpp"]
defines = ["BACKWARD_HAS_BFD=1"]
cflags = ["-std=c++11", "-ldw", "-lbfd"]

[packages.bgfx]
repo = "bkaradzic/bgfx"
description = "Cross-platform rendering library"
includes = ["include", "3rdparty"]

[packages.blake2]
repo = "BLAKE2/BLAKE2"
