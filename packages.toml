# hut packages index — local curated list of popular C/C++ libraries.
# Maps package names to GitHub repos + build instructions.
# No registry, no remote fetch. Ships with hut, user can extend at
# ~/.config/hut/packages.toml

[packages]

[packages.CLI11]
repo = "CLIUtils/CLI11"
description = "C++11 command-line parser header-only"
includes = ["include"]
cflags = ["-std=c++11"]

[packages.FastNoiseLite]
repo = "Auburn/FastNoiseLite"
description = "Fast portable noise library header-only"
includes = ["."]

[packages.HandmadeMath]
repo = "HandmadeMath/HandmadeMath"
description = "Single-header math for games (C)"
includes = ["."]
defines = ["HANDMADE_MATH_IMPLEMENTATION"]
cflags = ["-lm"]

[packages.acutest]
repo = "mity/acutest"
description = "Simple C/C++ unit testing single-header"
includes = ["."]
defines = ["ACUTEST_IMPLEMENTATION"]

[packages.argh]
repo = "adishavit/argh"
description = "Frustration-free CLI processing C++14 header"
includes = ["."]
cflags = ["-std=c++14"]

[packages.argparse]
repo = "cofyc/argparse"
description = "CLI argument parsing in C"
includes = ["."]
sources = ["argparse.c"]

[packages.args]
repo = "Taywee/args"
description = "Single-header C++11 argument parser"
includes = ["."]
cflags = ["-std=c++11"]

[packages.backward-cpp]
